<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savaş Gemileri - Battleship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Savaş Gemileri</h1>
  <p class="subtitle">Fleet Deployment Phase</p>
  
  <div class="game-container">
    <!-- Player's Fleet Grid -->
    <div class="grid-container">
      <h2>Your Fleet</h2>
      <div class="coord-labels-x">
        <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span>
        <span>F</span><span>G</span><span>H</span><span>I</span><span>J</span>
      </div>
      <div class="battle-grid" id="player-grid">
        <!-- 100 cells generated by JS -->
      </div>
    </div>
    
    <!-- Enemy Waters Grid -->
    <div class="grid-container">
      <h2>Enemy Waters</h2>
      <div class="coord-labels-x">
        <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span>
        <span>F</span><span>G</span><span>H</span><span>I</span><span>J</span>
      </div>
      <div class="battle-grid" id="enemy-grid">
        <!-- 100 cells generated by JS -->
      </div>
    </div>
  </div>
  
  <script src="game.js"></script>
</body>
</html>
